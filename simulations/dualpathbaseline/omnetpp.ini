[General]
network = dissertationsim.simulations.dualpathbaseline.DualPathBaseline
sim-time-limit = 30s
output-scalar-file = ../../results/dualpathbaseline/eval/${configname}-${runnumber}.sca
output-vector-file = ../../results/dualpathbaseline/eval/${configname}-${runnumber}.vec
eventlog-file = ../../results/dualpathbaseline/debug/${configname}-${runnumber}.elog
record-eventlog = false

**.ospf.ospfConfig = xmldoc("ASConfig.xml")

**.hostA.numApps = 1
**.hostB.numApps = 1

**.hostA.app[0].typename = "UdpBasicApp"
**.hostA.app[0].destAddresses = "hostB"
**.hostA.app[0].destPort = 5000
**.hostA.app[0].messageLength = 512B
**.hostA.app[0].sendInterval = 1s
**.hostA.app[0].startTime = 10s

**.hostB.app[0].typename = "UdpSink"
**.hostB.app[0].localPort = 5000

# Keep only a small set of built-in results for baseline verification.
**.app[0].packetSent.result-recording-modes = count
**.app[0].packetReceived.result-recording-modes = count
**.ipv4.ip.packetDropNoRouteFound.result-recording-modes = count
**.ipv4.ip.packetDropInterfaceDown.result-recording-modes = count

[Config Baseline]
description = "Dual-path OSPF baseline with a preferred primary path and a higher-cost backup path"

[Config BaselineDebug]
extends = Baseline
description = "Dual-path OSPF baseline with eventlog recording for manual path debugging"
record-eventlog = true
