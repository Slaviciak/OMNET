# Cost-aware backup-path cohort. This separate scenario removes the historical
# 10 Mbps preferred-span bottleneck, keeps the primary route as the normal
# lower-cost 100 Mbps OSPF path, and enables a mildly worse but QoS-capable
# southern repair corridor (80 Mbps, about 5 ms total extra corridor delay).
# Only the primary protected span degradation profile varies by cost-aware
# profile; repair-route semantics and deployed runtime models are unchanged.
[Config RegionalBackboneCostAwareBackupBase]
extends = RegionalBackboneFailureDegradedLinkBase
description = "Cost-aware backup-path base: normally better primary path, mildly penalized southern repair corridor, progressive protected-span degradation"
*.enableCoreBottleneck = false
*.enableCostAwareBackupPenalty = true
**.degradationController.updateInterval = 300ms
**.degradationController.appliedDelay.result-recording-modes = vector
**.degradationController.appliedPacketErrorRate.result-recording-modes = vector
output-scalar-file = ../../results/regionalbackbone/failure_detection_cost_aware_backup/${configname}-${runnumber}.sca
output-vector-file = ../../results/regionalbackbone/failure_detection_cost_aware_backup/${configname}-${runnumber}.vec
eventlog-file = ../../results/regionalbackbone/failure_detection_cost_aware_backup_debug/${configname}-${runnumber}.elog
record-eventlog = false

[Config RegionalBackboneCostAwareBackupRepairRouteBase]
extends = RegionalBackboneFailureDegradedLinkRepairRouteBase
description = "Cost-aware backup-path repair-route base with mildly penalized southern backup corridor"
*.enableCoreBottleneck = false
*.enableCostAwareBackupPenalty = true
output-scalar-file = ../../results/regionalbackbone/failure_detection_cost_aware_backup/${configname}-${runnumber}.sca
output-vector-file = ../../results/regionalbackbone/failure_detection_cost_aware_backup/${configname}-${runnumber}.vec
eventlog-file = ../../results/regionalbackbone/failure_detection_cost_aware_backup_debug/${configname}-${runnumber}.elog
