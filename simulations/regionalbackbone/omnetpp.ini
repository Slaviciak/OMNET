[Config RegionalBackboneMixedTrafficCongestionDegradationCohort]
extends = RegionalBackboneMixedTrafficCongestionDegradation
description = "Five-run mixed UDP/TCP reactive congestion baseline wrapper"
**.hostA.app[4].startTime = ${tcpSecondStart=73s,74s,75s,76s,77s}
output-scalar-file = ../../results/regionalbackbone/mixed_traffic_protection_cohort/${configname}-${runnumber}.sca
output-vector-file = ../../results/regionalbackbone/mixed_traffic_protection_cohort/${configname}-${runnumber}.vec
