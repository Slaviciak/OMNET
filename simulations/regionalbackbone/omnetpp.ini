[Config RegionalBackboneAiMrceLogRegMixedTraffic]
extends = RegionalBackboneAiMrceRuleBasedMixedTraffic
description = "Mixed UDP/TCP traffic with exported logistic-regression AI-MRCE protection on the regional congestion branch"
**.aiMrceController.decisionMode = "logisticRegression"
