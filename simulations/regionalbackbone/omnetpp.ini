# Modular degradation-sensitivity cohort. These configs intentionally reuse the
# same topology, traffic, AI-MRCE thresholds, BFD-like settings, and FRR-like
# repair-route semantics as the validated model-family cohort. Only the
# progressive brownout profile parameters and output directory differ.
