[General]
network = dissertationsim.simulations.regionalbackbone.RegionalBackbone
sim-time-limit = 60s
output-scalar-file = ../../results/regionalbackbone/eval/${configname}-${runnumber}.sca
output-vector-file = ../../results/regionalbackbone/eval/${configname}-${runnumber}.vec
eventlog-file = ../../results/regionalbackbone/debug/${configname}-${runnumber}.elog
record-eventlog = false

**.ospf.ospfConfig = xmldoc("ASConfig.xml")
**.scenarioManager.script = xml("<script/>")
*.enableDegradationController = false
*.enableCoreBottleneck = false
# AI-MRCE is opt-in per config so the baseline routing scenarios remain clean.
*.enableAiMrceController = false

**.hostA.numApps = 1
**.hostB.numApps = 1

**.hostA.app[0].typename = "UdpBasicApp"
**.hostA.app[0].destAddresses = "hostB"
**.hostA.app[0].destPort = 5000
**.hostA.app[0].messageLength = 512B
**.hostA.app[0].sendInterval = 1s
**.hostA.app[0].startTime = 20s

**.hostB.app[0].typename = "UdpSink"
**.hostB.app[0].localPort = 5000

# Keep this baseline skeleton focused on routing stability and delivery sanity.
**.hostA.app[0].packetSent.result-recording-modes = count
**.hostB.app[0].packetReceived.result-recording-modes = count
**.hostB.app[0].throughput.result-recording-modes = vector
**.hostB.app[0].endToEndDelay.result-recording-modes = vector
**.hostB.app[0].rcvdPkSeqNo.result-recording-modes = vector
**.ipv4.ip.packetDropNoRouteFound.result-recording-modes = count
**.ipv4.ip.packetDropInterfaceDown.result-recording-modes = count

[Config RegionalBackboneBaseline]
description = "Baseline routing validation for the medium-scale regional backbone topology"

[Config RegionalBackboneReactiveFailure]
description = "Reactive rerouting after coreNW-coreNE preferred backbone span fails at 40s"
sim-time-limit = 80s
**.scenarioManager.script = xml( \
        "<script>\n" + \
        "<at t='40s'><disconnect src-module='coreNW' src-gate='ethg$o[1]'/></at>\n" + \
        "<at t='40s'><disconnect src-module='coreNE' src-gate='ethg$o[0]'/></at>\n" + \
        "</script>")

[Config RegionalBackboneControlledDegradation]
description = "Staged intermittent brownout-style deterioration on coreNW-coreNE from 35s to 55s, followed by hard failure at 60s"
sim-time-limit = 90s
*.enableDegradationController = true
**.degradationController.firstInterfaceModule = "^.coreNW.eth[1]"
**.degradationController.secondInterfaceModule = "^.coreNE.eth[0]"
**.degradationController.profile = "stagedRealistic"
**.degradationController.startTime = 35s
**.degradationController.endTime = 55s
**.degradationController.updateInterval = 0.5s
**.degradationController.targetDelay = 35ms
**.degradationController.targetPacketErrorRate = 0.07
**.degradationController.appliedDelay.result-recording-modes = vector
**.degradationController.appliedPacketErrorRate.result-recording-modes = vector
**.scenarioManager.script = xml( \
        "<script>\n" + \
        "<at t='60s'><disconnect src-module='coreNW' src-gate='ethg$o[1]'/></at>\n" + \
        "<at t='60s'><disconnect src-module='coreNE' src-gate='ethg$o[0]'/></at>\n" + \
        "</script>")

[Config RegionalBackboneCongestionDegradation]
description = "Traffic-driven congestion on a 10 Mbps coreNW-coreNE bottleneck with staged UDP load and hard failure at 125s"
sim-time-limit = 150s
*.enableCoreBottleneck = true

**.hostA.numApps = 7
**.hostB.numApps = 7
**.hostA.app[*].typename = "UdpBasicApp"
**.hostA.app[*].destAddresses = "hostB"
**.hostB.app[*].typename = "UdpSink"

# Probe flow: low-rate telemetry traffic that should reveal delay and loss symptoms.
**.hostA.app[0].destPort = 5000
**.hostA.app[0].messageLength = 256B
**.hostA.app[0].sendInterval = 10ms
**.hostA.app[0].startTime = 20s

# Staged bulk flows. Each flow is about 2.4 Mbps, so aggregate demand crosses
# the 10 Mbps bottleneck gradually rather than immediately.
**.hostA.app[1].destPort = 5001
**.hostA.app[1].messageLength = 1200B
**.hostA.app[1].sendInterval = 4ms
**.hostA.app[1].startTime = 35s

**.hostA.app[2].destPort = 5002
**.hostA.app[2].messageLength = 1200B
**.hostA.app[2].sendInterval = 4ms
**.hostA.app[2].startTime = 50s

**.hostA.app[3].destPort = 5003
**.hostA.app[3].messageLength = 1200B
**.hostA.app[3].sendInterval = 4ms
**.hostA.app[3].startTime = 65s

**.hostA.app[4].destPort = 5004
**.hostA.app[4].messageLength = 1200B
**.hostA.app[4].sendInterval = 4ms
**.hostA.app[4].startTime = 80s

**.hostA.app[5].destPort = 5005
**.hostA.app[5].messageLength = 1200B
**.hostA.app[5].sendInterval = 4ms
**.hostA.app[5].startTime = 95s

**.hostA.app[6].destPort = 5006
**.hostA.app[6].messageLength = 1200B
**.hostA.app[6].sendInterval = 4ms
**.hostA.app[6].startTime = 110s

**.hostB.app[0].localPort = 5000
**.hostB.app[1].localPort = 5001
**.hostB.app[2].localPort = 5002
**.hostB.app[3].localPort = 5003
**.hostB.app[4].localPort = 5004
**.hostB.app[5].localPort = 5005
**.hostB.app[6].localPort = 5006

**.scenarioManager.script = xml( \
        "<script>\n" + \
        "<at t='125s'><disconnect src-module='coreNW' src-gate='ethg$o[1]'/></at>\n" + \
        "<at t='125s'><disconnect src-module='coreNE' src-gate='ethg$o[0]'/></at>\n" + \
        "</script>")

**.hostA.app[*].packetSent.result-recording-modes = count
**.hostB.app[*].packetReceived.result-recording-modes = count
**.hostB.app[*].throughput.result-recording-modes = vector
**.hostB.app[*].endToEndDelay.result-recording-modes = vector
**.hostB.app[*].rcvdPkSeqNo.result-recording-modes = vector

# Queue metrics on the forward preferred bottleneck interface coreNW -> coreNE.
# No custom AQM or vendor-specific buffer model is configured here.
# These queue metrics come from the default INET interface queue on the
# bottleneck NIC and should be interpreted as a simulator-default backlog
# approximation, not as a calibrated hardware queue model.
**.coreNW.eth[1].queue.queueLength.result-recording-modes = vector
**.coreNW.eth[1].queue.queueBitLength.result-recording-modes = vector
**.coreNW.eth[1].queue.queueingTime.result-recording-modes = vector

[Config RegionalBackboneAiMrceRuleBased]
extends = RegionalBackboneCongestionDegradation
description = "Runtime AI-MRCE rule-based baseline with proactive administrative withdrawal of coreNW-coreNE before the scripted hard failure"
# This prototype keeps standard OSPF behavior intact and uses a conservative
# project-local control action: administrative withdrawal of the preferred span.
*.enableAiMrceController = true
**.aiMrceController.protectedQueueModule = "^.coreNW.eth[1].queue"
**.aiMrceController.probeReceiverModule = "^.hostB.app[0]"
**.aiMrceController.firstInterfaceModule = "^.coreNW.eth[1]"
**.aiMrceController.secondInterfaceModule = "^.coreNE.eth[0]"
**.aiMrceController.decisionMode = "ruleBased"
**.aiMrceController.startTime = 20s
**.aiMrceController.evaluationInterval = 1s
**.aiMrceController.activationConsecutiveCycles = 3
**.aiMrceController.probeSendInterval = 10ms
**.aiMrceController.probePacketLength = 256B
**.aiMrceController.queueLengthThresholdPk = 40
**.aiMrceController.delayThreshold = 20ms
**.aiMrceController.throughputFloorRatio = 0.85
**.aiMrceController.packetCountFloorRatio = 0.85
**.aiMrceController.ruleRiskThreshold = 0.60

[Config RegionalBackboneAiMrceLogReg]
extends = RegionalBackboneAiMrceRuleBased
description = "Runtime AI-MRCE prototype with an exported logistic-regression runtime model and proactive administrative withdrawal of coreNW-coreNE before the scripted hard failure"
# The runtime model file is a deployment artifact exported offline from
# scenario-phase supervision; it is not a substitute for offline evaluation.
**.aiMrceController.decisionMode = "logisticRegression"
**.aiMrceController.runtimeModelFile = "aimrce_runtime_logreg.csv"

[Config RegionalBackboneAiMrceLinearSvm]
extends = RegionalBackboneAiMrceRuleBased
description = "Runtime AI-MRCE prototype with an exported linear-SVM runtime model and proactive administrative withdrawal of coreNW-coreNE before the scripted hard failure"
# This linear-margin candidate remains a compact project-local deployment
# artifact. Its bounded decision score is a conservative monotonic transform of
# the learned margin, not a calibrated production-grade risk probability.
**.aiMrceController.decisionMode = "linearSvm"
**.aiMrceController.runtimeModelFile = "aimrce_runtime_linsvm.csv"

[Config RegionalBackboneAiMrceShallowTree]
extends = RegionalBackboneAiMrceRuleBased
description = "Runtime AI-MRCE prototype with an exported shallow-tree runtime model and proactive administrative withdrawal of coreNW-coreNE before the scripted hard failure"
# This candidate keeps the runtime policy auditable: the deployment artifact is
# a small explicit tree over the same observable telemetry features.
**.aiMrceController.decisionMode = "shallowTree"
**.aiMrceController.runtimeModelFile = "aimrce_runtime_shallow_tree.csv"

# Dedicated multi-run wrappers for the regional congestion protection cohort.
# These keep the existing single-run configs intact while providing a separate,
# auditable output path for repeated practical-comparison batches.

[Config RegionalBackboneCongestionDegradationCohort]
extends = RegionalBackboneCongestionDegradation
description = "Five-run reactive congestion baseline wrapper for the regional congestion protection cohort"
repeat = 5
seed-set = ${repetition}
output-scalar-file = ../../results/regionalbackbone/congestion_protection_cohort/${configname}-${runnumber}.sca
output-vector-file = ../../results/regionalbackbone/congestion_protection_cohort/${configname}-${runnumber}.vec
eventlog-file = ../../results/regionalbackbone/congestion_protection_cohort_debug/${configname}-${runnumber}.elog
record-eventlog = false

[Config RegionalBackboneAiMrceRuleBasedCohort]
extends = RegionalBackboneAiMrceRuleBased
description = "Five-run rule-based AI-MRCE wrapper for the regional congestion protection cohort"
repeat = 5
seed-set = ${repetition}
