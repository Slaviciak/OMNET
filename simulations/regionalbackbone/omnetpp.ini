# Cost-aware mixed UDP/TCP transport-impact cohort. This fourth scenario keeps
# the cost-aware primary/backup route design, preserves the UDP probe and staged
# UDP application flows used by AI-MRCE telemetry, and adds one repeated TCP
# request-reply endpoint flow. TCP metrics are endpoint-observed received-byte/goodput/progress
# proxies only; retransmission, cwnd, and RTT are not claimed unless separately
# instrumented in a future pass.
[Config RegionalBackboneCostAwareTransportImpactBase]
extends = RegionalBackboneCostAwareBackupBase
description = "Cost-aware mixed UDP/TCP transport-impact base: UDP monitoring plus one repeated TCP request-reply flow"
**.hostB.app[0].vector-recording = true
**.hostA.app[7].vector-recording = true
**.coreNW.eth[1].queue.vector-recording = true
**.degradationController.vector-recording = true
**.aiMrceController.vector-recording = true
**.hostA.numApps = 8
**.hostB.numApps = 8
**.hostA.app[7].typename = "TcpBasicClientApp"
**.hostA.app[7].connectAddress = "hostB"
**.hostA.app[7].connectPort = 7000
**.hostA.app[7].localPort = -1
**.hostA.app[7].startTime = 25s
**.hostA.app[7].stopTime = -1s
**.hostA.app[7].numRequestsPerSession = 1
**.hostA.app[7].requestLength = 512B
**.hostA.app[7].replyLength = 128KiB
**.hostA.app[7].thinkTime = 0s
**.hostA.app[7].idleInterval = 1s
**.hostA.app[7].reconnectInterval = 2s
**.hostA.app[7].packetReceived.result-recording-modes = count, sum(packetBytes), vector(packetBytes)
**.hostB.app[7].typename = "TcpGenericServerApp"
**.hostB.app[7].localPort = 7000
**.hostB.app[7].replyDelay = 0s
output-scalar-file = ../../results/regionalbackbone/failure_detection_cost_aware_transport_impact/${configname}-${runnumber}.sca
output-vector-file = ../../results/regionalbackbone/failure_detection_cost_aware_transport_impact/${configname}-${runnumber}.vec
eventlog-file = ../../results/regionalbackbone/failure_detection_cost_aware_transport_impact_debug/${configname}-${runnumber}.elog
record-eventlog = false

[Config RegionalBackboneCostAwareTransportImpactRepairRouteBase]
extends = RegionalBackboneCostAwareBackupRepairRouteBase
description = "Cost-aware mixed UDP/TCP transport-impact repair-route base: UDP monitoring plus one repeated TCP request-reply flow"
**.hostB.app[0].vector-recording = true
**.hostA.app[7].vector-recording = true
**.coreNW.eth[1].queue.vector-recording = true
**.degradationController.vector-recording = true
**.aiMrceController.vector-recording = true
**.hostA.numApps = 8
**.hostB.numApps = 8
**.hostA.app[7].typename = "TcpBasicClientApp"
**.hostA.app[7].connectAddress = "hostB"
**.hostA.app[7].connectPort = 7000
**.hostA.app[7].localPort = -1
**.hostA.app[7].startTime = 25s
**.hostA.app[7].stopTime = -1s
**.hostA.app[7].numRequestsPerSession = 1
**.hostA.app[7].requestLength = 512B
**.hostA.app[7].replyLength = 128KiB
**.hostA.app[7].thinkTime = 0s
**.hostA.app[7].idleInterval = 1s
**.hostA.app[7].reconnectInterval = 2s
**.hostA.app[7].packetReceived.result-recording-modes = count, sum(packetBytes), vector(packetBytes)
**.hostB.app[7].typename = "TcpGenericServerApp"
**.hostB.app[7].localPort = 7000
**.hostB.app[7].replyDelay = 0s
output-scalar-file = ../../results/regionalbackbone/failure_detection_cost_aware_transport_impact/${configname}-${runnumber}.sca
output-vector-file = ../../results/regionalbackbone/failure_detection_cost_aware_transport_impact/${configname}-${runnumber}.vec
eventlog-file = ../../results/regionalbackbone/failure_detection_cost_aware_transport_impact_debug/${configname}-${runnumber}.elog
record-eventlog = false

