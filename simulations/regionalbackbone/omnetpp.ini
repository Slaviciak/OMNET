[Config RegionalBackboneAiMrceRuleBasedDebug]
extends = RegionalBackboneAiMrceRuleBased
description = "Regional backbone AI-MRCE rule-based prototype with eventlog recording for manual inspection"
output-scalar-file = ../../results/regionalbackbone/debug/${configname}-${runnumber}.sca
output-vector-file = ../../results/regionalbackbone/debug/${configname}-${runnumber}.vec
record-eventlog = true

