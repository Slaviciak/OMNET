[General]
network = dissertationsim.simulations.regionalbackbone.RegionalBackbone
sim-time-limit = 60s
output-scalar-file = ../../results/regionalbackbone/eval/${configname}-${runnumber}.sca
output-vector-file = ../../results/regionalbackbone/eval/${configname}-${runnumber}.vec
eventlog-file = ../../results/regionalbackbone/debug/${configname}-${runnumber}.elog
record-eventlog = false

**.ospf.ospfConfig = xmldoc("ASConfig.xml")
# OSPF remains the normal INET OSPFv2 reference. The project does not modify
# OSPF internals or hello/dead timers; fast detection is represented only by
# the project-local BFD-like comparator inside AiMrceController.
**.scenarioManager.script = xml("<script/>")
*.enableDegradationController = false
*.enableCoreBottleneck = false
*.enableAiMrceController = false

**.hostA.numApps = 1
**.hostB.numApps = 1

**.hostA.app[0].typename = "UdpBasicApp"
**.hostA.app[0].destAddresses = "hostB"
**.hostA.app[0].destPort = 5000
**.hostA.app[0].messageLength = 512B
**.hostA.app[0].sendInterval = 1s
**.hostA.app[0].startTime = 20s

**.hostB.app[0].typename = "UdpSink"
**.hostB.app[0].localPort = 5000

**.hostA.app[0].packetSent.result-recording-modes = count
**.hostB.app[0].packetReceived.result-recording-modes = count
**.hostB.app[0].throughput.result-recording-modes = vector
**.hostB.app[0].endToEndDelay.result-recording-modes = vector
**.hostB.app[0].rcvdPkSeqNo.result-recording-modes = vector
**.ipv4.ip.packetDropNoRouteFound.result-recording-modes = count
**.ipv4.ip.packetDropInterfaceDown.result-recording-modes = count

[Config RegionalBackboneCongestionDegradation]
description = "Runtime-model training/export baseline: staged UDP load on the 10 Mbps coreNW-coreNE bottleneck with hard failure at 125s"
sim-time-limit = 150s
*.enableCoreBottleneck = true

**.hostA.numApps = 7
**.hostB.numApps = 7
**.hostA.app[*].typename = "UdpBasicApp"
**.hostA.app[*].destAddresses = "hostB"
**.hostB.app[*].typename = "UdpSink"

# Probe flow used by AI-MRCE runtime features and receiver-side diagnostics.
**.hostA.app[0].destPort = 5000
**.hostA.app[0].messageLength = 256B
**.hostA.app[0].sendInterval = 10ms
**.hostA.app[0].startTime = 20s

# Staged bulk flows. Each is about 2.4 Mbps, so aggregate demand crosses the
# 10 Mbps bottleneck gradually before the hard failure.
**.hostA.app[1].destPort = 5001
**.hostA.app[1].messageLength = 1200B
**.hostA.app[1].sendInterval = 4ms
**.hostA.app[1].startTime = 35s

**.hostA.app[2].destPort = 5002
**.hostA.app[2].messageLength = 1200B
**.hostA.app[2].sendInterval = 4ms
**.hostA.app[2].startTime = 50s

**.hostA.app[3].destPort = 5003
**.hostA.app[3].messageLength = 1200B
**.hostA.app[3].sendInterval = 4ms
**.hostA.app[3].startTime = 65s

**.hostA.app[4].destPort = 5004
**.hostA.app[4].messageLength = 1200B
**.hostA.app[4].sendInterval = 4ms
**.hostA.app[4].startTime = 80s

**.hostA.app[5].destPort = 5005
**.hostA.app[5].messageLength = 1200B
**.hostA.app[5].sendInterval = 4ms
**.hostA.app[5].startTime = 95s

**.hostA.app[6].destPort = 5006
**.hostA.app[6].messageLength = 1200B
**.hostA.app[6].sendInterval = 4ms
**.hostA.app[6].startTime = 110s

**.hostB.app[0].localPort = 5000
**.hostB.app[1].localPort = 5001
**.hostB.app[2].localPort = 5002
**.hostB.app[3].localPort = 5003
**.hostB.app[4].localPort = 5004
**.hostB.app[5].localPort = 5005
**.hostB.app[6].localPort = 5006

**.scenarioManager.script = xml( \
        "<script>\n" + \
        "<at t='125s'><disconnect src-module='coreNW' src-gate='ethg$o[1]'/></at>\n" + \
        "<at t='125s'><disconnect src-module='coreNE' src-gate='ethg$o[0]'/></at>\n" + \
        "</script>")

**.hostA.app[*].packetSent.result-recording-modes = count
**.hostB.app[*].packetReceived.result-recording-modes = count
**.hostB.app[*].throughput.result-recording-modes = vector
**.hostB.app[*].endToEndDelay.result-recording-modes = vector
**.hostB.app[*].rcvdPkSeqNo.result-recording-modes = vector

# Queue metrics on the forward preferred bottleneck interface coreNW -> coreNE.
**.coreNW.eth[1].queue.queueLength.result-recording-modes = vector
**.coreNW.eth[1].queue.queueBitLength.result-recording-modes = vector
**.coreNW.eth[1].queue.queueingTime.result-recording-modes = vector

[Config RegionalBackboneFailureDegradedLinkBase]
extends = RegionalBackboneCongestionDegradation
description = "Active degraded-link model-family base: staged UDP load plus deterministic progressive protected-span brownout before the same hard failure"
*.enableDegradationController = true
**.degradationController.firstInterfaceModule = "^.coreNW.eth[1]"
**.degradationController.secondInterfaceModule = "^.coreNE.eth[0]"
**.degradationController.profile = "stagedRealistic"
**.degradationController.startTime = 105s
**.degradationController.endTime = 124s
**.degradationController.updateInterval = 300ms
**.degradationController.targetDelay = 45ms
**.degradationController.targetPacketErrorRate = 0.95
**.degradationController.appliedDelay.result-recording-modes = vector
**.degradationController.appliedPacketErrorRate.result-recording-modes = vector
output-scalar-file = ../../results/regionalbackbone/failure_detection_degraded_link_model_family/${configname}-${runnumber}.sca
output-vector-file = ../../results/regionalbackbone/failure_detection_degraded_link_model_family/${configname}-${runnumber}.vec
eventlog-file = ../../results/regionalbackbone/failure_detection_degraded_link_model_family_debug/${configname}-${runnumber}.elog
record-eventlog = false

[Config RegionalBackboneFailureDegradedLinkRepairRouteBase]
extends = RegionalBackboneFailureDegradedLinkBase
description = "Active repair-route base: project-local FRR-like static /32 repair-route activation on the southern backup corridor"
*.enableAiMrceController = true
**.aiMrceController.protectedQueueModule = "^.coreNW.eth[1].queue"
**.aiMrceController.probeReceiverModule = "^.hostB.app[0]"
**.aiMrceController.protectionAction = "localRepairStaticRoutes"
**.aiMrceController.localRepairRouteMetric = 1
**.aiMrceController.localRepairRouteSpecs = "^.accessA,^.accessA.eth[2],^.west2.eth[0],^.hostB.eth[0];^.west2,^.west2.eth[1],^.coreSW.eth[0],^.hostB.eth[0];^.coreSW,^.coreSW.eth[1],^.coreSE.eth[0],^.hostB.eth[0];^.coreSE,^.coreSE.eth[3],^.east2.eth[0],^.hostB.eth[0];^.east2,^.east2.eth[1],^.accessB.eth[1],^.hostB.eth[0];^.accessB,^.accessB.eth[1],^.east2.eth[1],^.hostA.eth[0];^.east2,^.east2.eth[0],^.coreSE.eth[3],^.hostA.eth[0];^.coreSE,^.coreSE.eth[0],^.coreSW.eth[1],^.hostA.eth[0];^.coreSW,^.coreSW.eth[0],^.west2.eth[1],^.hostA.eth[0];^.west2,^.west2.eth[0],^.accessA.eth[2],^.hostA.eth[0]"
**.aiMrceController.firstInterfaceModule = "^.coreNW.eth[1]"
**.aiMrceController.secondInterfaceModule = "^.coreNE.eth[0]"
**.aiMrceController.decisionMode = "ruleBased"
**.aiMrceController.startTime = 20s
**.aiMrceController.evaluationInterval = 1s
**.aiMrceController.activationConsecutiveCycles = 3
**.aiMrceController.probeSendInterval = 10ms
**.aiMrceController.probePacketLength = 256B
**.aiMrceController.queueLengthThresholdPk = 40
**.aiMrceController.delayThreshold = 20ms
**.aiMrceController.throughputFloorRatio = 0.85
**.aiMrceController.packetCountFloorRatio = 0.85
**.aiMrceController.ruleRiskThreshold = 0.60
**.aiMrceController.enableAimrceDecision = true
**.aiMrceController.enableBfdLikeDetection = false
**.aiMrceController.hardFailureTime = 125s

[Config RegionalBackboneFailureDegradedLinkOspfOnly]
extends = RegionalBackboneFailureDegradedLinkBase
description = "Degraded-link model-family comparison: OSPF-only reactive baseline"

[Config RegionalBackboneFailureDegradedLinkBfdLikeFrr]
extends = RegionalBackboneFailureDegradedLinkRepairRouteBase
description = "Degraded-link model-family comparison: project-local BFD-like reactive detector plus FRR-like repair routes"
**.aiMrceController.enableAimrceDecision = false
**.aiMrceController.enableBfdLikeDetection = true
**.aiMrceController.bfdLikeStartTime = 20s
**.aiMrceController.bfdLikeDetectionInterval = 300ms
**.aiMrceController.bfdLikeDetectMultiplier = 3
**.aiMrceController.bfdLikeExpectedProbeCount = 1
**.aiMrceController.bfdLikeUseModeledProbeLoss = true

[Config RegionalBackboneFailureDegradedLinkAiMrceRuleBased]
extends = RegionalBackboneFailureDegradedLinkRepairRouteBase
description = "Degraded-link model-family comparison: rule-based AI-MRCE proactive trigger plus FRR-like repair routes"
**.aiMrceController.decisionMode = "ruleBased"

[Config RegionalBackboneFailureDegradedLinkAiMrceLogReg]
extends = RegionalBackboneFailureDegradedLinkAiMrceRuleBased
description = "Degraded-link model-family comparison: logistic-regression AI-MRCE runtime model plus FRR-like repair routes"
**.aiMrceController.decisionMode = "logisticRegression"
**.aiMrceController.runtimeModelFile = "aimrce_runtime_logreg.csv"

[Config RegionalBackboneFailureDegradedLinkAiMrceLinearSvm]
extends = RegionalBackboneFailureDegradedLinkAiMrceRuleBased
description = "Degraded-link model-family comparison: linear-SVM AI-MRCE runtime model plus FRR-like repair routes"
**.aiMrceController.decisionMode = "linearSvm"
**.aiMrceController.runtimeModelFile = "aimrce_runtime_linsvm.csv"

[Config RegionalBackboneFailureDegradedLinkAiMrceShallowTree]
extends = RegionalBackboneFailureDegradedLinkAiMrceRuleBased
description = "Degraded-link model-family comparison: shallow-tree AI-MRCE runtime model plus FRR-like repair routes"
**.aiMrceController.decisionMode = "shallowTree"
**.aiMrceController.runtimeModelFile = "aimrce_runtime_shallow_tree.csv"

[Config RegionalBackboneFailureDegradedLinkHybrid]
extends = RegionalBackboneFailureDegradedLinkAiMrceRuleBased
description = "Degraded-link model-family comparison: hybrid BFD-like safety net with default rule-based AI-MRCE; first trigger wins"
**.aiMrceController.enableBfdLikeDetection = true
**.aiMrceController.bfdLikeStartTime = 20s
**.aiMrceController.bfdLikeDetectionInterval = 300ms
**.aiMrceController.bfdLikeDetectMultiplier = 3
**.aiMrceController.bfdLikeExpectedProbeCount = 1
**.aiMrceController.bfdLikeUseModeledProbeLoss = true

[Config RegionalBackboneFailureDegradedLinkOspfOnlyCohort]
extends = RegionalBackboneFailureDegradedLinkOspfOnly
description = "Five-run OSPF-only wrapper for the degraded-link model-family comparison cohort"
repeat = 5
seed-set = ${repetition}

[Config RegionalBackboneFailureDegradedLinkBfdLikeFrrCohort]
extends = RegionalBackboneFailureDegradedLinkBfdLikeFrr
description = "Five-run BFD-like + FRR wrapper for the degraded-link model-family comparison cohort"
repeat = 5
seed-set = ${repetition}

[Config RegionalBackboneFailureDegradedLinkAiMrceRuleBasedCohort]
extends = RegionalBackboneFailureDegradedLinkAiMrceRuleBased
description = "Five-run rule-based AI-MRCE wrapper for the degraded-link model-family comparison cohort"
repeat = 5
seed-set = ${repetition}

[Config RegionalBackboneFailureDegradedLinkAiMrceLogRegCohort]
extends = RegionalBackboneFailureDegradedLinkAiMrceLogReg
description = "Five-run logistic-regression AI-MRCE wrapper for the degraded-link model-family comparison cohort"
repeat = 5
seed-set = ${repetition}

[Config RegionalBackboneFailureDegradedLinkAiMrceLinearSvmCohort]
extends = RegionalBackboneFailureDegradedLinkAiMrceLinearSvm
description = "Five-run linear-SVM AI-MRCE wrapper for the degraded-link model-family comparison cohort"
repeat = 5
seed-set = ${repetition}

[Config RegionalBackboneFailureDegradedLinkAiMrceShallowTreeCohort]
extends = RegionalBackboneFailureDegradedLinkAiMrceShallowTree
description = "Five-run shallow-tree AI-MRCE wrapper for the degraded-link model-family comparison cohort"
repeat = 5
seed-set = ${repetition}

[Config RegionalBackboneFailureDegradedLinkHybridCohort]
extends = RegionalBackboneFailureDegradedLinkHybrid
description = "Five-run hybrid BFD-like + default AI-MRCE wrapper for the degraded-link model-family comparison cohort"
repeat = 5
seed-set = ${repetition}

[Config RegionalBackboneFailureDegradedLinkHybridDebug]
extends = RegionalBackboneFailureDegradedLinkHybrid
description = "Debug/demo config with controlled EV logs for degraded-link hybrid BFD-like/AI-MRCE trigger inspection"
output-scalar-file = ../../results/regionalbackbone/debug/${configname}-${runnumber}.sca
output-vector-file = ../../results/regionalbackbone/debug/${configname}-${runnumber}.vec
eventlog-file = ../../results/regionalbackbone/debug/${configname}-${runnumber}.elog
record-eventlog = false
RegionalBackbone.aiMrceController.cmdenv-log-level = info
**.cmdenv-log-level = off
**.aiMrceController.verboseInitializationLogging = true
**.aiMrceController.verboseModelLoadingLogging = true
**.aiMrceController.verboseTelemetryLogging = true
**.aiMrceController.telemetryLogInterval = 5s
**.aiMrceController.verboseDecisionLogging = true
**.aiMrceController.decisionLogInterval = 5s
**.aiMrceController.logOnlyPositiveDecisions = true
**.aiMrceController.verboseTriggerLogging = true
**.aiMrceController.verboseRepairRouteLogging = true
**.aiMrceController.verboseBfdLikeLogging = true

[Config RegionalBackboneFailureDegradedLinkAiMrceLogRegDebug]
extends = RegionalBackboneFailureDegradedLinkAiMrceLogReg
description = "Debug/demo config with controlled EV logs for the degraded-link logistic-regression AI-MRCE model-family variant"
output-scalar-file = ../../results/regionalbackbone/debug/${configname}-${runnumber}.sca
output-vector-file = ../../results/regionalbackbone/debug/${configname}-${runnumber}.vec
eventlog-file = ../../results/regionalbackbone/debug/${configname}-${runnumber}.elog
record-eventlog = false
RegionalBackbone.aiMrceController.cmdenv-log-level = info
**.cmdenv-log-level = off
**.aiMrceController.verboseInitializationLogging = true
**.aiMrceController.verboseModelLoadingLogging = true
**.aiMrceController.verboseTelemetryLogging = true
**.aiMrceController.telemetryLogInterval = 5s
**.aiMrceController.verboseDecisionLogging = true
**.aiMrceController.decisionLogInterval = 5s
**.aiMrceController.logOnlyPositiveDecisions = true
**.aiMrceController.verboseTriggerLogging = true
**.aiMrceController.verboseRepairRouteLogging = true

