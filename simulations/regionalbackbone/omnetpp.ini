# Instrumented mixed UDP/TCP transport-impact cohort. This scenario is a
# behavior-preserving telemetry clone of the validated transport-impact cohort:
# same topology, profiles, traffic mix, AI-MRCE policies, BFD-like comparator,
# and FRR-like repair-route behavior, with isolated output paths and a targeted
# recording policy for richer publication-quality transport/network metrics.
[Config RegionalBackboneCostAwareTransportInstrumentedBase]
extends = RegionalBackboneCostAwareTransportImpactBase
description = "Instrumented cost-aware mixed UDP/TCP transport-impact base with targeted INET telemetry"
**.vector-recording = false
**.degradationController.vector-recording = true
**.aiMrceController.vector-recording = true
**.coreNW.eth[1].queue.vector-recording = true
**.coreNE.eth[0].queue.vector-recording = true
**.accessA.eth[2].queue.vector-recording = true
**.west2.eth[1].queue.vector-recording = true
**.coreSW.eth[1].queue.vector-recording = true
**.coreSE.eth[3].queue.vector-recording = true
**.east2.eth[1].queue.vector-recording = true
**.hostA.app[*].packetSent.result-recording-modes = count
**.hostB.app[*].packetReceived.result-recording-modes = count
**.hostB.app[*].throughput.result-recording-modes = mean, max
**.hostB.app[*].endToEndDelay.result-recording-modes = mean, max, histogram
**.hostA.app[7].packetReceived.result-recording-modes = count, sum(packetBytes)
**.hostA.app[7].endToEndDelay.result-recording-modes = mean, max, histogram
**.hostA.tcp.**.rtt.result-recording-modes = mean, max
**.hostA.tcp.**.srtt.result-recording-modes = mean, max
**.hostA.tcp.**.cwnd.result-recording-modes = mean, max
**.hostA.tcp.**.ssthresh.result-recording-modes = mean, max
**.hostA.tcp.**.numRTOs.result-recording-modes = count
**.hostA.tcp.**.retransmission.result-recording-modes = count
output-scalar-file = ../../results/regionalbackbone/ti_inst/${configname}-${runnumber}.sca
output-vector-file = ../../results/regionalbackbone/ti_inst/${configname}-${runnumber}.vec
eventlog-file = ../../results/regionalbackbone/ti_inst_debug/${configname}-${runnumber}.elog
record-eventlog = false

