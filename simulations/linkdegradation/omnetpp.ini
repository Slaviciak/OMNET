[General]
network = dissertationsim.simulations.linkdegradation.LinkDegradation
sim-time-limit = 60s
output-scalar-file = ../../results/linkdegradation/eval/${configname}-${runnumber}.sca
output-vector-file = ../../results/linkdegradation/eval/${configname}-${runnumber}.vec
eventlog-file = ../../results/linkdegradation/debug/${configname}-${runnumber}.elog
record-eventlog = false

**.ospf.ospfConfig = xmldoc("ASConfig.xml")

**.hostA.numApps = 2
**.hostB.numApps = 2

**.hostA.app[0].typename = "UdpBasicApp"
**.hostA.app[0].destAddresses = "hostB"
**.hostA.app[0].destPort = 5000
**.hostA.app[0].messageLength = 512B
**.hostA.app[0].sendInterval = 1s
**.hostA.app[0].startTime = 10s

**.hostA.app[1].typename = "UdpBasicApp"
**.hostA.app[1].destAddresses = "hostB"
**.hostA.app[1].destPort = 5001
**.hostA.app[1].messageLength = 128B
**.hostA.app[1].sendInterval = 250ms
**.hostA.app[1].startTime = 12s

**.hostB.app[0].typename = "UdpSink"
**.hostB.app[0].localPort = 5000
**.hostB.app[1].typename = "UdpSink"
**.hostB.app[1].localPort = 5001

**.degradationController.firstInterfaceModule = "^.r2.eth[1]"
**.degradationController.secondInterfaceModule = "^.r3.eth[0]"
**.degradationController.startTime = 20s
**.degradationController.endTime = 40s
**.degradationController.updateInterval = 0.5s
**.degradationController.profile = "mildLinear"
**.degradationController.targetDelay = 15ms
**.degradationController.targetPacketErrorRate = 0.03

**.scenarioManager.script = xml( \
        "<script>\n" + \
        "<at t='45s'><disconnect src-module='r2' src-gate='ethg$o[1]'/></at>\n" + \
        "<at t='45s'><disconnect src-module='r3' src-gate='ethg$o[0]'/></at>\n" + \
        "</script>")

# Keep evaluation results focused on end-to-end delivery and the degradation timeline.
**.hostA.app[*].packetSent.result-recording-modes = count
**.hostB.app[*].packetReceived.result-recording-modes = count
**.hostB.app[*].throughput.result-recording-modes = vector
**.hostB.app[*].endToEndDelay.result-recording-modes = vector
**.hostB.app[*].rcvdPkSeqNo.result-recording-modes = vector
**.ipv4.ip.packetDropNoRouteFound.result-recording-modes = count
**.ipv4.ip.packetDropInterfaceDown.result-recording-modes = count

[Config MildLinear]
description = "Moderate linear delay and PER increase on r2-r3 from 20s to 40s, followed by hard failure at 45s"

[Config StrongLinear]
description = "Stronger linear delay and PER increase on r2-r3 from 20s to 40s, followed by hard failure at 45s"
**.degradationController.profile = "strongLinear"
**.degradationController.targetDelay = 40ms
**.degradationController.targetPacketErrorRate = 0.08

[Config UnstableLinear]
description = "Overall upward delay and PER trend with deterministic oscillations on r2-r3 before hard failure at 45s"
**.degradationController.profile = "unstableLinear"
**.degradationController.targetDelay = 25ms
**.degradationController.targetPacketErrorRate = 0.05

[Config StagedRealistic]
description = "Staged intermittent brownout-style delay, delay-variation, and PER deterioration on r2-r3 before hard failure at 45s"
**.degradationController.profile = "stagedRealistic"
**.degradationController.targetDelay = 35ms
**.degradationController.targetPacketErrorRate = 0.07

[Config UnstableLinearDebug]
extends = UnstableLinear
description = "Unstable linear degradation with eventlog recording for manual inspection"
output-scalar-file = ../../results/linkdegradation/debug/${configname}-${runnumber}.sca
output-vector-file = ../../results/linkdegradation/debug/${configname}-${runnumber}.vec
record-eventlog = true
