[General]
network = dissertationsim.simulations.reactivefailure.ReactiveFailure
sim-time-limit = 60s
output-scalar-file = ../../results/reactivefailure/eval/${configname}-${runnumber}.sca
output-vector-file = ../../results/reactivefailure/eval/${configname}-${runnumber}.vec
eventlog-file = ../../results/reactivefailure/debug/${configname}-${runnumber}.elog
record-eventlog = false

**.ospf.ospfConfig = xmldoc("ASConfig.xml")

**.hostA.numApps = 1
**.hostB.numApps = 1

**.hostA.app[0].typename = "UdpBasicApp"
**.hostA.app[0].destAddresses = "hostB"
**.hostA.app[0].destPort = 5000
**.hostA.app[0].messageLength = 512B
**.hostA.app[0].sendInterval = 1s
**.hostA.app[0].startTime = 10s

**.hostB.app[0].typename = "UdpSink"
**.hostB.app[0].localPort = 5000

**.scenarioManager.script = xml( \
        "<script>\n" + \
        "<at t='20s'><disconnect src-module='r2' src-gate='ethg$o[1]'/></at>\n" + \
        "<at t='20s'><disconnect src-module='r3' src-gate='ethg$o[0]'/></at>\n" + \
        "</script>")

# Keep results focused on end-to-end delivery and obvious routing failures.
**.app[0].packetSent.result-recording-modes = count
**.app[0].packetReceived.result-recording-modes = count
**.hostB.app[0].throughput.result-recording-modes = vector
**.hostB.app[0].rcvdPkSeqNo.result-recording-modes = vector
**.ipv4.ip.packetDropNoRouteFound.result-recording-modes = count
**.ipv4.ip.packetDropInterfaceDown.result-recording-modes = count

[Config ReactiveFailure]
description = "Primary r2-r3 link fails at 20s; OSPF should reconverge onto the backup r1-r4-r3 path"

[Config ReactiveFailureDebug]
extends = ReactiveFailure
description = "Primary r2-r3 link fails at 20s with eventlog recording for manual reroute debugging"
record-eventlog = true
