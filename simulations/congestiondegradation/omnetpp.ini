[General]
network = dissertationsim.simulations.congestiondegradation.CongestionDegradation
sim-time-limit = 180s
output-scalar-file = ../../results/congestiondegradation/eval/${configname}-${runnumber}.sca
output-vector-file = ../../results/congestiondegradation/eval/${configname}-${runnumber}.vec
eventlog-file = ../../results/congestiondegradation/debug/${configname}-${runnumber}.elog
record-eventlog = false

**.ospf.ospfConfig = xmldoc("ASConfig.xml")

**.hostA.numApps = 8
**.hostB.numApps = 8

**.hostA.app[*].typename = "UdpBasicApp"
**.hostA.app[*].destAddresses = "hostB"

**.hostA.app[0].destPort = 5000
**.hostA.app[0].messageLength = 256B
**.hostA.app[0].sendInterval = 10ms
**.hostA.app[0].startTime = 20s

**.hostA.app[1].destPort = 5001
**.hostA.app[1].messageLength = 1200B
**.hostA.app[1].sendInterval = 2ms
**.hostA.app[1].startTime = 30s

**.hostA.app[2].destPort = 5002
**.hostA.app[2].messageLength = 1200B
**.hostA.app[2].sendInterval = 2ms
**.hostA.app[2].startTime = 50s

**.hostA.app[3].destPort = 5003
**.hostA.app[3].messageLength = 1200B
**.hostA.app[3].sendInterval = 2ms
**.hostA.app[3].startTime = 65s

**.hostA.app[4].destPort = 5004
**.hostA.app[4].messageLength = 1200B
**.hostA.app[4].sendInterval = 2ms
**.hostA.app[4].startTime = 80s

**.hostA.app[5].destPort = 5005
**.hostA.app[5].messageLength = 1200B
**.hostA.app[5].sendInterval = 2ms
**.hostA.app[5].startTime = 95s

**.hostA.app[6].destPort = 5006
**.hostA.app[6].messageLength = 1200B
**.hostA.app[6].sendInterval = 2ms
**.hostA.app[6].startTime = 110s

**.hostA.app[7].destPort = 5007
**.hostA.app[7].messageLength = 1200B
**.hostA.app[7].sendInterval = 2ms
**.hostA.app[7].startTime = 125s

**.hostB.app[*].typename = "UdpSink"
**.hostB.app[0].localPort = 5000
**.hostB.app[1].localPort = 5001
**.hostB.app[2].localPort = 5002
**.hostB.app[3].localPort = 5003
**.hostB.app[4].localPort = 5004
**.hostB.app[5].localPort = 5005
**.hostB.app[6].localPort = 5006
**.hostB.app[7].localPort = 5007

**.scenarioManager.script = xml( \
        "<script>\n" + \
        "<at t='150s'><disconnect src-module='r2' src-gate='ethg$o[1]'/></at>\n" + \
        "<at t='150s'><disconnect src-module='r3' src-gate='ethg$o[0]'/></at>\n" + \
        "</script>")

# Keep evaluation focused on end-to-end delivery and the bottleneck queue state.
**.hostA.app[*].packetSent.result-recording-modes = count
**.hostB.app[*].packetReceived.result-recording-modes = count
**.hostB.app[*].throughput.result-recording-modes = vector
**.hostB.app[*].endToEndDelay.result-recording-modes = vector
**.hostB.app[*].rcvdPkSeqNo.result-recording-modes = vector
**.ipv4.ip.packetDropNoRouteFound.result-recording-modes = count
**.ipv4.ip.packetDropInterfaceDown.result-recording-modes = count

# Queue metrics on the forward bottleneck interface r2 -> r3.
**.r2.eth[1].queue.queueLength.result-recording-modes = vector
**.r2.eth[1].queue.queueBitLength.result-recording-modes = vector
**.r2.eth[1].queue.queueingTime.result-recording-modes = vector

[Config CongestionDegradation]
description = "Traffic-driven congestion on a 30 Mbps primary r2-r3 bottleneck with staged UDP load and hard failure at 150s"

[Config CongestionDegradationDebug]
extends = CongestionDegradation
description = "Traffic-driven congestion with eventlog recording for manual inspection"
record-eventlog = true
