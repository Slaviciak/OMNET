[General]
network = dissertationsim.simulations.proactiveswitch.ProactiveSwitch
sim-time-limit = 60s
output-scalar-file = ../../results/proactiveswitch/eval/${configname}-${runnumber}.sca
output-vector-file = ../../results/proactiveswitch/eval/${configname}-${runnumber}.vec
eventlog-file = ../../results/proactiveswitch/debug/${configname}-${runnumber}.elog
record-eventlog = false

**.ospf.ospfConfig = xmldoc("ASConfig.xml")

**.hostA.numApps = 1
**.hostB.numApps = 1

**.hostA.app[0].typename = "UdpBasicApp"
**.hostA.app[0].destAddresses = "hostB"
**.hostA.app[0].destPort = 5000
**.hostA.app[0].messageLength = 512B
**.hostA.app[0].sendInterval = 1s
**.hostA.app[0].startTime = 10s

**.hostB.app[0].typename = "UdpSink"
**.hostB.app[0].localPort = 5000

**.scenarioManager.script = xml( \
        "<script>\n" + \
        "<at t='20s'><disconnect src-module='r2' src-gate='ethg$o[1]'/></at>\n" + \
        "<at t='20s'><disconnect src-module='r3' src-gate='ethg$o[0]'/></at>\n" + \
        "</script>")

# Keep results small but sufficient to compare before 18s, between 18s-20s, and after 20s.
**.app[0].packetSent.result-recording-modes = count
**.app[0].packetReceived.result-recording-modes = count
**.ipv4.ip.packetDropNoRouteFound.result-recording-modes = count
**.ipv4.ip.packetDropInterfaceDown.result-recording-modes = count

[Config ProactiveSwitch]
description = "Administrative withdrawal of the primary r2-r3 path at 18s, followed by physical disconnect at 20s"

[Config ProactiveSwitchDebug]
extends = ProactiveSwitch
description = "Administrative withdrawal at 18s with eventlog recording for manual inspection"
record-eventlog = true
